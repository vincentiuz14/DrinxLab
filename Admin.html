<!DOCTYPE html>
<html lang="id">
<head>
    <!-- ... head sama ... -->
    <style>
        /* ... tambahkan CSS ini ... */
        .masked-pw {
            font-family: monospace;
            min-width: 60px;
            display: inline-block;
        }

        .masked-pw.revealed {
            background: rgba(139, 0, 0, 0.3);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #8B0000;
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- ... body sama ... -->
    
    <script>
        // ... firebase config sama ...
        
        function togglePassword(btn) {
            const container = btn.parentElement;
            const span = container.querySelector('.masked-pw');
            const realPw = span.getAttribute('data-pw');
            
            if (span.classList.contains('masked')) {
                span.textContent = realPw;
                span.classList.remove('masked');
                span.classList.add('revealed');
                btn.textContent = '🙈';
            } else {
                span.textContent = '•'.repeat(realPw.length);
                span.classList.add('masked');
                span.classList.remove('revealed');
                btn.textContent = '👁️';
            }
        }

        function updateQueueTable(data) {
            // ... kode sebelumnya sama ...
            
            const password = item.password || '-';
            const maskedPassword = password.length > 3 ? '•'.repeat(password.length) : password;
            
            return `
                <tr class="${item.status === 'processing' ? 'processing' : ''}" data-key="${item.key}">
                    <td class="queue-number-cell">#${item.number}</td>
                    <td>${item.username}</td>
                    <td>
                        <div class="password-container">
                            <span class="masked-pw masked" data-pw="${password}">${maskedPassword}</span>
                            <button class="btn-toggle-pw" onclick="togglePassword(this)">👁️</button>
                        </div>
                    </td>
                    <!-- ... sisanya sama ... -->
                </tr>
            `;
        }

        function showDetail(key) {
            // ... kode sebelumnya sama ...
            
            modalBody.innerHTML = `
                <!-- ... detail rows lainnya ... -->
                <div class="detail-row">
                    <span class="detail-label">Password</span>
                    <div class="detail-value password-container">
                        <span class="detail-value password" id="modalPassword" style="filter: blur(5px);">${item.password || '-'}</span>
                        <button class="btn-toggle-pw" onclick="toggleModalPassword()">👁️</button>
                    </div>
                </div>
                <!-- ... sisanya sama ... -->
            `;
            
            // ... sisanya sama ...
        }

        function toggleModalPassword() {
            const pwSpan = document.getElementById('modalPassword');
            const btn = event.target;
            
            if (!pwSpan.dataset.hidden) {
                pwSpan.dataset.hidden = "true";
            }
            
            if (pwSpan.dataset.hidden === "true") {
                pwSpan.style.filter = 'none';
                pwSpan.dataset.hidden = "false";
                btn.textContent = '🙈';
            } else {
                pwSpan.style.filter = 'blur(5px)';
                pwSpan.dataset.hidden = "true";
                btn.textContent = '👁️';
            }
        }
        
        // ... fungsi lainnya sama ...
    </script>
</body>
</html>
